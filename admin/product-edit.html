        .variant-content {

        .variant-content p {

        #variantImagesArea {

    <script>

        const currentPage = "products";

        const API_BASE =
            "http://127.0.0.1:8000/api";

        let product = null;

        let deletedImages = [];

        let selectedImages = [];

        const urlParams =
            new URLSearchParams(
                window.location.search
            );

        const productId =
            urlParams.get("id");

        async function loadSidebar() {

            const response =
                await fetch("./sidebar.html");

            const html =
                await response.text();

            document.getElementById(
                "sidebar-container"
            ).innerHTML = html;

            document
                .querySelectorAll(".sidebar-link")
                .forEach(link => {

                    if (
                        link.dataset.page === currentPage
                    ) {

                        link.classList.add("active");
                    }
                });
        }

        async function loadBrands() {

            try {

                const response =
                    await fetch(
                        API_BASE + "/brands"
                    );

                const data =
                    await response.json();

                const select =
                    document.getElementById(
                        "brandInput"
                    );

                select.innerHTML = `
            <option value="">
                Marka Seç
            </option>
        `;

                (data.data || []).forEach(brand => {

                    select.innerHTML += `
                <option value="${brand.id}">
                    ${brand.name}
                </option>
            `;
                });

            } catch {

                alert("Markalar yüklenemedi");
            }
        }

        async function loadCategories() {

            try {

                const response =
                    await fetch(
                        API_BASE + "/categories"
                    );

                const data =
                    await response.json();

                const select =
                    document.getElementById(
                        "categoryInput"
                    );

                select.innerHTML = `
            <option value="">
                Kategori Seç
            </option>
        `;

                (data.data || []).forEach(category => {

                    select.innerHTML += `
                <option value="${category.id}">
                    ${category.name}
                </option>
            `;
                });

            } catch {

                alert("Kategoriler yüklenemedi");
            }
        }

        async function loadProduct() {

            try {

                const token =
                    localStorage.getItem(
                        "admin_token"
                    );

                if (!token) {

                    window.location.href =
                        "../login.html";

                    return;
                }

                const response =
                    await fetch(

                        API_BASE +
                        `/admin/products/${productId}`,

                        {

                            headers: {

                                Accept:
                                    "application/json",

                                Authorization:
                                    `Bearer ${token}`
                            }
                        }
                    );

                const data =
                    await response.json();

                if (!response.ok) {

                    alert(
                        data.message ||
                        "Ürün yüklenemedi"
                    );

                    return;
                }

                product = data.data || {};

                product.images =
                    product.images || [];

                fillProductFields();

                renderProductImages();

                document.getElementById(
                    "profileLoader"
                ).style.display = "none";

                document.getElementById(
                    "profileContent"
                ).style.display = "block";

            } catch {

                alert("Ürün yüklenemedi");
            }
        }

        function fillProductFields() {

            console.log(product);

            document.getElementById(
                "nameInput"
            ).value =
                product.name || "";

            document.getElementById(
                "descriptionInput"
            ).value =
                product.description || "";

            document.getElementById(
                "categoryInput"
            ).value =
                product.category_id ||
                "";

            document.getElementById(
                "brandInput"
            ).value =
                product.brand_id ||
                "";

            document.getElementById(
                "priceInput"
            ).value =
                product.price || "";

            document.getElementById(
                "stockInput"
            ).value =
                product.stock || "";

            document.getElementById(
                "discountInput"
            ).value =
                product.discount_rate || "";

            document.getElementById(
                "barcodeInput"
            ).value =
                product.barcode || "";

            document.getElementById(
                "expireDateInput"
            ).value =
                product.expire_date || "";

            document.getElementById(
                "countryInput"
            ).value =
                product.country || "";

            document.getElementById(
                "contentsInput"
            ).value =
                product.contents || "";

            document.getElementById(
                "storageInput"
            ).value =
                product.storage || "";

            if (product.size) {

                const parts =
                    product.size.split(" ");

                document.getElementById(
                    "sizeValueInput"
                ).value =
                    parts[0] || "";

                document.getElementById(
                    "sizeTypeInput"
                ).value =
                    parts[1] || "ML";
            }
        }

        function renderProductImages() {

            const container =
                document.getElementById(
                    "imagePreviewContainer"
                );

            container.innerHTML = "";

            const existingImages =
                Array.isArray(product.images)
                    ? product.images
                    : [];

            existingImages.forEach(image => {

                container.innerHTML += `

        <div style="width:150px;">

            <div style="
                border:1px solid #eee;
                border-radius:14px;
                overflow:hidden;
            ">

                <img
                    src="${image.url}"
                    style="
                        width:100%;
                        height:170px;
                        object-fit:cover;
                    "
                >

                <button
                    type="button"

                    onclick="
                        removeExistingImage(${image.id})
                    "

                    style="
                        width:100%;
                        border:none;
                        background:#e74c3c;
                        color:white;
                        padding:12px;
                        font-weight:700;
                    "
                >

                    Sil

                </button>

            </div>

        </div>
        `;
            });

            selectedImages.forEach(
                (image, index) => {

                    const preview =
                        URL.createObjectURL(image);

                    container.innerHTML += `

            <div style="width:150px;">

                <div style="
                    border:1px solid #eee;
                    border-radius:14px;
                    overflow:hidden;
                ">

                    <img
                        src="${preview}"
                        style="
                            width:100%;
                            height:170px;
                            object-fit:cover;
                        "
                    >

                    <button
                        type="button"

                        onclick="
                            removeNewImage(${index})
                        "

                        style="
                            width:100%;
                            border:none;
                            background:#111;
                            color:white;
                            padding:12px;
                            font-weight:700;
                        "
                    >

                        Kaldır

                    </button>

                </div>

            </div>
            `;
                }
            );
        }

        function removeExistingImage(id) {

            deletedImages.push(id);

            product.images =
                product.images.filter(

                    image =>
                        image.id !== id
                );

            renderProductImages();
        }

        function removeNewImage(index) {

            selectedImages.splice(index, 1);

            renderProductImages();
        }

        document
            .getElementById(
                "productImagesInput"
            )
            .addEventListener(
                "change",
                function (e) {

                    selectedImages = [

                        ...selectedImages,

                        ...Array.from(
                            e.target.files
                        )
                    ];

                    renderProductImages();
                }
            );

        async function saveProduct() {

            const button =
                document.getElementById(
                    "updateProductButton"
                );

            try {

                button.disabled = true;

                button.innerHTML =
                    "Güncelleniyor...";

                const token =
                    localStorage.getItem(
                        "admin_token"
                    );

                const formData =
                    new FormData();

                formData.append(
                    "_method",
                    "PATCH"
                );

                formData.append(
                    "name",
                    document.getElementById(
                        "nameInput"
                    ).value
                );

                formData.append(
                    "description",
                    document.getElementById(
                        "descriptionInput"
                    ).value
                );

                formData.append(
                    "category_id",
                    document.getElementById(
                        "categoryInput"
                    ).value
                );

                formData.append(
                    "brand_id",
                    document.getElementById(
                        "brandInput"
                    ).value
                );

                formData.append(
                    "price",
                    document.getElementById(
                        "priceInput"
                    ).value
                );

                formData.append(
                    "stock",
                    document.getElementById(
                        "stockInput"
                    ).value
                );

                const discountValue =
                    document.getElementById(
                        "discountInput"
                    ).value.trim();

                formData.append(
                    "discount_rate",
                    discountValue === ""
                        ? 0
                        : discountValue
                );

                formData.append(
                    "barcode",
                    document.getElementById(
                        "barcodeInput"
                    ).value
                );

                formData.append(
                    "expire_date",
                    document.getElementById(
                        "expireDateInput"
                    ).value
                );

                formData.append(
                    "country",
                    document.getElementById(
                        "countryInput"
                    ).value
                );

                formData.append(
                    "contents",
                    document.getElementById(
                        "contentsInput"
                    ).value
                );

                formData.append(
                    "storage",
                    document.getElementById(
                        "storageInput"
                    ).value
                );

                const sizeValue =
                    document.getElementById(
                        "sizeValueInput"
                    ).value;

                const sizeType =
                    document.getElementById(
                        "sizeTypeInput"
                    ).value;

                formData.append(
                    "size",
                    sizeValue + " " + sizeType
                );

                deletedImages.forEach(
                    (id, index) => {

                        formData.append(
                            `deleted_images[${index}]`,
                            id
                        );
                    }
                );

                selectedImages.forEach(
                    (image, index) => {

                        formData.append(
                            `images[${index}]`,
                            image
                        );
                    }
                );

                const response =
                    await fetch(

                        API_BASE +
                        `/admin/products/${productId}`,

                        {

                            method: "POST",

                            headers: {

                                Accept:
                                    "application/json",

                                Authorization:
                                    `Bearer ${token}`
                            },

                            body: formData
                        }
                    );

                const data =
                    await response.json();

                if (!response.ok) {

                    console.log(data);

                    alert(
                        data.message ||
                        "Ürün güncellenemedi"
                    );

                    return;
                }

                alert(
                    "Ürün başarıyla güncellendi 🚀"
                );

                window.location.href =
                    "./products.html";

            } catch (error) {

                console.log(error);

                alert(
                    "Bir hata oluştu"
                );

            } finally {

                button.disabled = false;

                button.innerHTML =
                    "Ürünü Güncelle";
            }
        }

        document
            .getElementById(
                "updateProductButton"
            )
            .addEventListener(
                "click",
                saveProduct
            );

        async function initPage() {

            await loadSidebar();

            await loadBrands();

            await loadCategories();

            await loadProduct();
        }

        initPage();

    </script>
</body>

</html>
