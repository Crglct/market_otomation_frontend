                                <div class="col-lg-6">

        ">

                                <!-- PRICE -->

                                <!-- STOCK -->

                                <!-- DISCOUNT -->

                                <div class="col-lg-12">

                width:100%;
                height:120px;
                border:1px solid #e1e1e1;
                border-radius:8px;
                padding:15px;
            " placeholder="Örn: Su, şeker, aroma verici"></textarea>

                                    </div>

                                </div>

                                <div class="col-lg-12">

                                    <div class="checkout__input">

                                        <p>Saklama Koşulu</p>

                                        <textarea id="storageInput" style="
                width:100%;
                height:120px;
                border:1px solid #e1e1e1;
                border-radius:8px;
                padding:15px;
            " placeholder="Örn: Serin ve kuru yerde saklayınız"></textarea>

                                    </div>

                                </div>

                                <!-- IMAGES -->

                                <div class="col-lg-12">

                                    <div class="checkout__input">

                                        <p>Ürün Fotoğrafları</p>

                                        <input type="file" id="productImagesInput" multiple>

                                        <div id="imagePreviewContainer" style="

 <script>

const API_BASE =
    "http://127.0.0.1:8000/api";

const token =
    localStorage.getItem(
        "admin_token"
    );

if (!token) {

    window.location.href =
        "login.html";
}

$(document).ready(function () {

    if ($.fn.niceSelect) {

        $('select').niceSelect();
    }
});

function showPopup(
    message,
    success = true
) {

    const popup =
        document.getElementById(
            "popup"
        );

    const popupText =
        document.getElementById(
            "popupText"
        );

    const popupIcon =
        document.getElementById(
            "popupIcon"
        );

    popupText.innerText =
        message;

    if (success) {

        popupIcon.style.background =
            "#27ae60";

        popupIcon.innerText =
            "✓";

    } else {

        popupIcon.style.background =
            "#e74c3c";

        popupIcon.innerText =
            "!";
    }

    popup.style.display =
        "flex";

    setTimeout(() => {

        popup.style.display =
            "none";

    }, 3000);
}

async function loadCategories() {

    try {

        const response =
            await fetch(
                API_BASE +
                "/categories"
            );

        const data =
            await response.json();

        if (!response.ok) {

            return;
        }

        const select =
            document.getElementById(
                "categoryInput"
            );

        select.innerHTML =
            `
            <option value="">
                Kategori Seç
            </option>
        `;

        data.data.forEach(category => {

            select.innerHTML += `

                <option value="${category.id}">
                    ${category.name}
                </option>

            `;
        });

        $('#categoryInput')
            .niceSelect('update');

    } catch (error) {

        showPopup(
            "Kategoriler yüklenemedi",
            false
        );
    }
}

async function loadBrands() {

    try {

        const response =
            await fetch(
                API_BASE +
                "/brands"
            );

        const data =
            await response.json();

        if (!response.ok) {

            return;
        }

        const select =
            document.getElementById(
                "brandInput"
            );

        select.innerHTML =
            `
            <option value="">
                Marka Seç
            </option>
        `;

        data.data.forEach(brand => {

            select.innerHTML += `

                <option value="${brand.id}">
                    ${brand.name}
                </option>

            `;
        });

        $('#brandInput')
            .niceSelect('update');

    } catch (error) {

        showPopup(
            "Markalar yüklenemedi",
            false
        );
    }
}

const currentPage =
    "product-create";

async function initializePage() {

    await loadSidebar();

    await loadCategories();

    await loadBrands();

    document
        .getElementById(
            "profileLoader"
        )
        .style.display =
        "none";

    document
        .getElementById(
            "profileContent"
        )
        .style.display =
        "block";
}

initializePage();

let selectedImages = [];

document
    .getElementById(
        "productImagesInput"
    )
    .addEventListener(
        "change",
        handleImages
    );

function handleImages(event) {

    const files =
        Array.from(
            event.target.files
        );

    selectedImages = [

        ...selectedImages,

        ...files
    ];

    renderImagePreviews();
}

function renderImagePreviews() {

    const container =
        document.getElementById(
            "imagePreviewContainer"
        );

    container.innerHTML = "";

    selectedImages.forEach(
        (image, index) => {

            const imageUrl =
                URL.createObjectURL(
                    image
                );

            container.innerHTML += `

                <div style="
                    width:120px;
                    border:1px solid #eee;
                    border-radius:12px;
                    overflow:hidden;
                    background:white;
                ">

                    <img
                        src="${imageUrl}"

                        style="
                            width:100%;
                            height:120px;
                            object-fit:cover;
                        "
                    >

                    <button
                        type="button"

                        onclick="
                            removeImage(${index})
                        "

                        style="
                            width:100%;
                            border:none;
                            background:#e74c3c;
                            color:white;
                            padding:10px;
                            font-weight:600;
                            cursor:pointer;
                        "
                    >
                        Sil
                    </button>

                </div>

            `;
        }
    );
}

function removeImage(index) {

    selectedImages.splice(
        index,
        1
    );

    renderImagePreviews();
}

document
    .getElementById(
        "createProductButton"
    )
    .addEventListener(
        "click",
        createProduct
    );

async function createProduct() {

    const button =
        document.getElementById(
            "createProductButton"
        );

    if (button.disabled) {

        return;
    }

    button.disabled = true;

    button.innerText =
        "Oluşturuluyor...";

    const name =
        document.getElementById(
            "nameInput"
        ).value.trim();

    const categoryId =
        document.getElementById(
            "categoryInput"
        ).value;

    const brandId =
        document.getElementById(
            "brandInput"
        ).value;

    const price =
        document.getElementById(
            "priceInput"
        ).value;

    const stock =
        document.getElementById(
            "stockInput"
        ).value;

    const sizeValue =
        document.getElementById(
            "sizeValueInput"
        ).value;

    const sizeType =
        document.getElementById(
            "sizeTypeInput"
        ).value;

    const discountRate =
        document.getElementById(
            "discountInput"
        ).value;

    const status =
        document.getElementById(
            "statusInput"
        ).value;

    const description =
        document.getElementById(
            "descriptionInput"
        ).value.trim();

    const barcode =
        document.getElementById(
            "barcodeInput"
        ).value.trim();

    const expireDate =
        document.getElementById(
            "expireDateInput"
        ).value;

    const country =
        document.getElementById(
            "countryInput"
        ).value.trim();

    const contents =
        document.getElementById(
            "contentsInput"
        ).value.trim();

    const storage =
        document.getElementById(
            "storageInput"
        ).value.trim();

    if (

        !name ||

        !categoryId ||

        !brandId ||

        !price ||

        !stock

    ) {

        showPopup(
            "Gerekli alanları doldurun",
            false
        );

        button.disabled = false;

        button.innerText =
            "Ürünü Oluştur";

        return;
    }

    const formData =
        new FormData();

    formData.append(
        "name",
        name
    );

    formData.append(
        "category_id",
        categoryId
    );

    formData.append(
        "brand_id",
        brandId
    );

    formData.append(
        "price",
        price
    );

    formData.append(
        "stock",
        stock
    );

    formData.append(
        "size",
        sizeValue
    );

    formData.append(
        "size_type",
        sizeType
    );

    formData.append(
        "discount_rate",
        discountRate || 0
    );

    formData.append(
        "active",
        status
    );

    formData.append(
        "description",
        description
    );

    formData.append(
        "barcode",
        barcode
    );

    formData.append(
        "expire_date",
        expireDate
    );

    formData.append(
        "country",
        country
    );

    formData.append(
        "contents",
        contents
    );

    formData.append(
        "storage",
        storage
    );

    selectedImages.forEach(
        (image, index) => {

            formData.append(

                `images[${index}]`,

                image
            );
        }
    );

    try {

        const response =
            await fetch(

                API_BASE +
                "/admin/products",

                {

                    method: "POST",

                    headers: {

                        Authorization:
                            "Bearer " + token,

                        Accept:
                            "application/json"
                    },

                    body: formData
                }
            );

        const data =
            await response.json();

        if (!response.ok) {

            showPopup(

                data.message ||

                "Ürün oluşturulamadı",

                false
            );

            return;
        }

        showPopup(
            "Ürün başarıyla oluşturuldu 🚀"
        );

        document.getElementById("nameInput").value = "";

        document.getElementById("priceInput").value = "";

        document.getElementById("stockInput").value = "";

        document.getElementById("discountInput").value = "";

        document.getElementById("descriptionInput").value = "";

        document.getElementById("barcodeInput").value = "";

        document.getElementById("expireDateInput").value = "";

        document.getElementById("countryInput").value = "";

        document.getElementById("contentsInput").value = "";

        document.getElementById("storageInput").value = "";

        document.getElementById("sizeValueInput").value = "";

        document.getElementById("categoryInput").selectedIndex = 0;

        document.getElementById("brandInput").selectedIndex = 0;

        document.getElementById("sizeTypeInput").selectedIndex = 0;

        document.getElementById("statusInput").selectedIndex = 0;

        document.getElementById("productImagesInput").value = "";

        selectedImages = [];

        renderImagePreviews();

        $('select').niceSelect('update');

    } catch (error) {

        showPopup(
            "Sunucu hatası",
            false
        );

    } finally {

        button.disabled = false;

        button.innerText =
            "Ürünü Oluştur";
    }
}

async function loadSidebar() {

    try {

        const response =
            await fetch(
                "./sidebar.html"
            );

        const html =
            await response.text();

        document.getElementById(
            "sidebar-container"
        ).innerHTML = html;

        const links =
            document.querySelectorAll(
                ".sidebar-link"
            );

        links.forEach(link => {

            if (
                link.dataset.page ===
                currentPage
            ) {

                link.classList.add(
                    "active"
                );
            }
        });

    } catch (error) {

        console.log(error);
    }
}

</script>
